
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dear Mamii 💌</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#fff1f6,#ffe3ee,#fff8fb);
  font-family:Georgia,serif;
  overflow:hidden;
}
.wrap{
  text-align:center;
  padding:24px;
}
.hint{
  color:#b85b78;
  font-size:18px;
  margin-bottom:28px;
}
.envelope{
  position:relative;
  width:320px;
  height:210px;
  margin:auto;
  cursor:pointer;
  transition:.5s;
}
.envelope:hover{transform:translateY(-6px)}
.back{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff9fbd;
  border-radius:12px;
  box-shadow:0 18px 45px rgba(173,68,109,.25);
}
.flap{
  position:absolute;
  top:0;
  left:0;
  width:0;
  height:0;
  border-left:160px solid transparent;
  border-right:160px solid transparent;
  border-top:115px solid #ff7fa8;
  transform-origin:top;
  transition:1s;
  z-index:4;
}
.front-left{
  position:absolute;
  bottom:0;
  left:0;
  width:0;
  height:0;
  border-bottom:210px solid #ff8fb3;
  border-right:320px solid transparent;
  z-index:3;
  border-radius:0 0 12px 12px;
}
.front-right{
  position:absolute;
  bottom:0;
  right:0;
  width:0;
  height:0;
  border-bottom:210px solid #ff7fa8;
  border-left:320px solid transparent;
  z-index:3;
  border-radius:0 0 12px 12px;
}
.heart{
  position:absolute;
  left:50%;
  top:58%;
  transform:translate(-50%,-50%);
  font-size:46px;
  z-index:5;
  transition:.8s;
}
.letter{
  position:absolute;
  left:20px;
  bottom:12px;
  width:280px;
  min-height:185px;
  background:white;
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 14px 35px rgba(0,0,0,.12);
  z-index:2;
  transform:translateY(40px);
  opacity:0;
  transition:1s .3s;
}
.line{
  font-size:19px;
  line-height:1.65;
  color:#444;
  min-height:31px;
  text-align:left;
}
.cursor{animation:blink .8s infinite}
@keyframes blink{50%{opacity:0}}
.open .flap{transform:rotateX(180deg); z-index:1}
.open .letter{
  transform:translateY(-175px);
  opacity:1;
  z-index:6;
}
.open .heart{
  transform:translate(-50%,20px) scale(.8);
  opacity:0;
}
.floating{
  position:absolute;
  color:#ff7fa8;
  font-size:22px;
  animation:float 6s linear infinite;
  opacity:.55;
}
@keyframes float{
  from{transform:translateY(110vh) scale(.8)}
  to{transform:translateY(-15vh) scale(1.4)}
}
</style>
</head>

<body>
<div class="wrap">
  <div class="hint">Click the envelope 💌</div>

  <div class="envelope" id="envelope">
    <div class="back"></div>
    <div class="letter">
      <div id="l1" class="line"></div>
      <div id="l2" class="line"></div>
      <div id="l3" class="line"></div>
    </div>
    <div class="flap"></div>
    <div class="front-left"></div>
    <div class="front-right"></div>
    <div class="heart">💖</div>
  </div>
</div>

<script>
const envelope=document.getElementById("envelope");
const hint=document.querySelector(".hint");

const msgs=[
  "Dear Mamii,",
  "I still love you like it's the very first day.",
  "Time may have changed many things, but my love for you never did. 💖"
];

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function type(id,text){
  const el=document.getElementById(id);
  for(let i=0;i<text.length;i++){
    el.innerHTML=text.substring(0,i+1)+"<span class='cursor'>|</span>";
    await sleep(65);
  }
  el.innerHTML=text;
}

let opened=false;
envelope.addEventListener("click",async()=>{
  if(opened) return;
  opened=true;
  envelope.classList.add("open");
  hint.innerHTML="For you, Mamii 🤍";
  await sleep(1100);
  await type("l1",msgs[0]);
  await sleep(450);
  await type("l2",msgs[1]);
  await sleep(450);
  await type("l3",msgs[2]);
});

for(let i=0;i<18;i++){
  const h=document.createElement("div");
  h.className="floating";
  h.innerHTML=Math.random()>.5 ? "♡" : "♥";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDelay=Math.random()*6+"s";
  h.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(h);
}
</script>
</body>
</html>
